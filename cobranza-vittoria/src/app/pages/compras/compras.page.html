
<div class="table-wrap purchase-table" *ngIf="itemPrecios.length">
  <table>
    <thead>
      <tr>
        <th>Especialidad</th>
        <th>Material</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th>Proveedor</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let x of itemsFiltrados">
        <td>{{ mostrarEspecialidad(x) }}</td>
        <td>{{ x.material }}</td>
        <td>{{ x.unidadMedida }}</td>
        <td>{{ x.cantidad }}</td>
        <td>{{ x.proveedor }}</td>
        <td><button class="btn btn-secondary" (click)="abrirPrecioPorItem(x)">{{ x.total > 0 ? 'Editar precio' : 'Colocar precio' }}</button></td>
      </tr>
      <tr *ngIf="!itemsFiltrados.length">
        <td colspan="6" class="empty-row">No hay ítems con el filtro seleccionado.</td>
      </tr>
    </tbody>
  </table>
</div>
