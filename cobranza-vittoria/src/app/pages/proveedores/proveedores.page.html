<div class="page-header">
  <div>
    <div class="page-title">Proveedores</div>
    <div class="page-subtitle">Gestión y mantenimiento del maestro de proveedores.</div>
  </div>
</div>

<div class="split providers-layout">
  <section class="panel">
    <div class="panel-title">Listado</div>

    <div *ngIf="!rows.length" class="empty-state">
      No hay proveedores registrados.
    </div>

    <div *ngIf="rows.length" class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Proveedor</th>
            <th>RUC</th>
            <th>Contacto</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows">
            <td>{{ row.razonSocial }}</td>
            <td>{{ row.ruc }}</td>
            <td>{{ row.contacto || '-' }}</td>
            <td>{{ row.telefono || '-' }}</td>
            <td>{{ row.correo || '-' }}</td>
            <td>
              <button class="btn btn-secondary" (click)="edit(row)">Editar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <div class="panel-title">Formulario</div>

    <div class="form-grid two">
      <div class="field">
        <label>Razón social</label>
        <input [(ngModel)]="form.razonSocial" />
      </div>

      <div class="field">
        <label>RUC</label>
        <input [(ngModel)]="form.ruc" />
      </div>

      <div class="field">
        <label>Contacto</label>
        <input [(ngModel)]="form.contacto" />
      </div>

      <div class="field">
        <label>Teléfono</label>
        <input [(ngModel)]="form.telefono" />
      </div>

      <div class="field">
        <label>Correo</label>
        <input [(ngModel)]="form.correo" />
      </div>

      <div class="field">
        <label>Dirección</label>
        <input [(ngModel)]="form.direccion" />
      </div>

      <div class="field">
        <label>Banco</label>
        <input [(ngModel)]="form.banco" />
      </div>

      <div class="field">
        <label>Cuenta corriente</label>
        <input [(ngModel)]="form.cuentaCorriente" />
      </div>

      <div class="field">
        <label>CCI</label>
        <input [(ngModel)]="form.cci" />
      </div>

      <div class="field">
        <label>Cuenta detracción</label>
        <input [(ngModel)]="form.cuentaDetraccion" />
      </div>

      <div class="field">
        <label>Trabaja con proveedor</label>
        <input [(ngModel)]="form.trabajamosConProveedor" />
      </div>

      <div class="field">
        <label>Estado</label>
        <select [(ngModel)]="form.activo">
          <option [ngValue]="true">Activo</option>
          <option [ngValue]="false">Inactivo</option>
        </select>
      </div>

      <div class="field" style="grid-column: 1 / -1;">
        <label>Descripción servicio</label>
        <textarea [(ngModel)]="form.descripcionServicio"></textarea>
      </div>

      <div class="field" style="grid-column: 1 / -1;">
        <label>Observación</label>
        <textarea [(ngModel)]="form.observacion"></textarea>
      </div>
    </div>

    <div class="toolbar providers-toolbar" style="margin-top: 14px;">
      <button class="btn btn-primary" (click)="save()" [disabled]="!form.razonSocial || !form.ruc">
        Guardar proveedor
      </button>
      <button class="btn btn-ghost" (click)="reset()">Limpiar</button>
    </div>

    <div *ngIf="msg" class="empty-state providers-message" style="margin-top: 14px; padding: 14px;">
      {{ msg }}
    </div>
  </section>
</div>
