<div class="page-header"><div><div class="page-title">Roles</div><div class="page-subtitle">Mantenimiento de roles del sistema.</div></div></div>
<div class="split">
  <section class="panel">
    <div class="panel-title">Listado</div>
    <div class="form-grid two" style="margin-bottom:16px;">
      <div class="field"><label>Estado</label><select [(ngModel)]="filtroActivo" (change)="load()"><option [ngValue]="null">Todos</option><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div>
    </div>
    <div *ngIf="!rows.length" class="empty-state">No hay roles registrados.</div>
    <div *ngIf="rows.length" class="table-wrap"><table><thead><tr><th>Rol</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
      <tr *ngFor="let row of rows"><td>{{ row.nombreRol || row.nombre }}</td><td>{{ row.descripcion || '-' }}</td><td><span class="badge" [class.badge--ok]="row.activo" [class.badge--neutral]="!row.activo">{{ row.activo ? 'Activo' : 'Inactivo' }}</span></td><td><button class="btn btn-secondary" (click)="edit(row)">Editar</button></td></tr>
    </tbody></table></div>
  </section>
  <section class="panel">
    <div class="panel-title">Formulario</div>
    <div class="form-grid two">
      <div class="field"><label>Nombre</label><input [(ngModel)]="form.nombreRol"></div>
      <div class="field"><label>Estado</label><select [(ngModel)]="form.activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div>
      <div class="field" style="grid-column:1/-1;"><label>Descripción</label><textarea [(ngModel)]="form.descripcion"></textarea></div>
    </div>
    <div class="toolbar" style="margin-top:14px;"><button class="btn btn-primary" (click)="save()" [disabled]="!form.nombreRol">Guardar</button><button class="btn btn-ghost" (click)="reset()">Limpiar</button></div>
    <div *ngIf="msg" class="empty-state" style="margin-top:14px; padding:14px;">{{ msg }}</div>
  </section>
</div>
