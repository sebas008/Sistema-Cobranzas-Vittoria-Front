<div 
  class="notification-container" 
  [class.show]="state.visible"
  [ngClass]="state.type"
>
  <div class="notification-content">
    <i class="feather" 
       [class.icon-check-circle]="state.type === 'success'"
       [class.icon-x-circle]="state.type === 'error'"
       [class.icon-info]="state.type === 'info'"
    ></i>
    <span class="notification-message">{{ state.message }}</span>
  </div>
</div>
